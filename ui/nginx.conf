# Serves the built Vite SPA on / and reverse-proxies /api/* to the
# lc-checker-svc Java backend in the same Docker network (lc-checker-net).
#
# Same-origin proxy means the UI calls relative `/api/...` URLs in BOTH
# local-dev (Vite proxy) and prod (this nginx) — no env-var swap, no CORS.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Invoices can be multi-MB PDFs.
    client_max_body_size 50M;

    # SPA fallback: unknown paths return index.html so React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Common proxy settings to the lc-checker-svc Java backend.
    # Long timeouts because vision-LLM extraction can take 30-60s per invoice.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $lc_api_upstream http://lc-checker-svc:8080;

    # SSE pipeline progress — must NOT be buffered, otherwise events arrive in
    # one big batch when the connection closes (hangs the UI's progress bar).
    # The `X-Accel-Buffering: no` header also signals Cloudflare's tunnel and
    # any other reverse proxy in the chain to bypass response buffering.
    # Regex match wins over the prefix `location /api/` below per nginx rules.
    location ~ ^/api/v1/lc-check/[^/]+/stream$ {
        proxy_pass $lc_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no always;
        proxy_connect_timeout 10s;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Reverse-proxy /api/* — actual application endpoints.
    # Exact-match locations below override this for /api, /api/, /api/docs.
    location /api/ {
        proxy_pass $lc_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Scalar API reference, exposed at three paths:
    #   /docs, /api/docs, /api, /api/
    # All four serve the same Scalar HTML proxied from the Mac's /docs.
    # The `=` makes these exact-match so they win over `location /api/` above.
    location = /docs       { proxy_pass $lc_api_upstream/docs; proxy_set_header Host $host; }
    location = /api/docs   { proxy_pass $lc_api_upstream/docs; proxy_set_header Host $host; }
    location = /api        { proxy_pass $lc_api_upstream/docs; proxy_set_header Host $host; }
    location = /api/       { proxy_pass $lc_api_upstream/docs; proxy_set_header Host $host; }

    # OpenAPI 3 spec — Scalar HTML fetches this on load.
    location = /v3/api-docs {
        proxy_pass $lc_api_upstream/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
