# lc-checker-api — runtime configuration
#
# Environment overrides (see .env.example at repo root).
#
# Profiles:
#   default — console logging (logback-spring.xml)
#   prod    — JSON logging (logback-json.xml), for Loki/ELK ingest

spring:
  application:
    name: lc-checker-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  ai:
    openai:
      api-key: ${LLM_API_KEY:}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      chat:
        # base-url already includes /v1 per OpenAI-compatible endpoint convention
        # (Qwen Bailian, OpenAI, DeepSeek, Ollama). Override Spring AI's default
        # `/v1/chat/completions` to just `/chat/completions` so we don't end up
        # with a double-/v1/ path.
        completions-path: /chat/completions
        options:
          model: ${LLM_MODEL:deepseek-chat}
          temperature: 0.0

  # Multipart limits for /api/v1/lc-check (20MB PDF cap per InputValidator).
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  # Database (PostgreSQL 16)
  # The socketFactory + socketFactoryArg pair pins the JDBC TCP socket's local
  # source IP via BoundSocketFactory. Default DB_LOCAL_BIND="" → factory is a
  # no-op (kernel chooses source IP). Set DB_LOCAL_BIND=192.168.31.201 (or your
  # LAN interface IP) to defend against macOS picking a TUN/CGNAT IP from
  # ClashX/Surge/Mihomo, which surfaces as NoRouteToHostException.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/lc_checker?socketFactory=com.lc.checker.infra.persistence.jdbc.BoundSocketFactory&socketFactoryArg=${DB_LOCAL_BIND:}
    username: ${DB_USER:lcuser}
    password: ${DB_PASSWORD:lcpass123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      # Validate before lending a connection — evicts pool entries that went
      # stale because of network rearrangement (proxy toggle, wifi roam).
      connection-test-query: SELECT 1
      validation-timeout: 3000
      keepalive-time: 60000
  # JDBC Template uses datasource above; NamedParameterJdbcTemplate used in JdbcCheckSessionStore.
  jackson:
    serialization:
      write-dates-as-timestamps: false

# --- Sample files ----------------------------------------------------------------
# Points to test/golden/ relative to the JVM working directory (user.dir).
# Run the app from the project root so this resolves correctly.
# Override SAMPLES_FILES_PATH env var for different setups (e.g. /opt/lc-checker/golden/).
samples:
  files-path: ${SAMPLES_FILES_PATH:file:/Users/pc-rn/ws/ai-lab/lc-cheker-solution/test/golden/}

server:
  port: ${SERVER_PORT:8080}

# --- Extractor sources (Stage 1b) --------------------------------------------
# Each enabled source is invoked and its result persisted as a separate row in
# stage_invoice_extract (one per session per source). The orchestrator then
# selects one row (first source above confidence-threshold, in priority order)
# and marks it is_selected=true for downstream rule checks.
#
# Default matches docker-compose.yml: vision only. Enable Docling / MinerU
# locally by setting EXTRACTOR_DOCLING_ENABLED=true and starting the full profile:
#   docker compose --profile full up -d
extractor:
  # Two independent vision-LLM sources fire in parallel against the same PDF.
  # Selection rule: first SUCCESS in chain priority order — local first, cloud second.
  cloud-llm-vl-enabled:  ${EXTRACTOR_CLOUD_LLM_VL_ENABLED:true}   # hosted vision LLM
  local-llm-vl-enabled:  ${EXTRACTOR_LOCAL_LLM_VL_ENABLED:false}  # local vision LLM (MLX / Ollama)
  confidence-threshold:  ${EXTRACTOR_CONFIDENCE_THRESHOLD:0.80}
  # Supplementary text-layout sources — run in parallel, results persisted for UI
  # display, but never selected as the winner for rule checks.
  docling-enabled:       ${EXTRACTOR_DOCLING_ENABLED:false}
  mineru-enabled:        ${EXTRACTOR_MINERU_ENABLED:false}

# --- Cloud vision-language LLM (hosted commercial / paid API) ----------------
# OpenAI-compatible /chat/completions. Provider switch is config-only:
#   Qwen Cloud:  CLOUD_LLM_VL_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1  CLOUD_LLM_VL_MODEL=qwen-vl-plus
#   OpenAI:      CLOUD_LLM_VL_BASE_URL=https://api.openai.com/v1                           CLOUD_LLM_VL_MODEL=gpt-4o
#   Gemini:      CLOUD_LLM_VL_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai/  CLOUD_LLM_VL_MODEL=gemini-1.5-flash
cloud-llm-vl:
  base-url:           ${CLOUD_LLM_VL_BASE_URL:http://host.docker.internal:11434/v1}
  api-key:            ${CLOUD_LLM_VL_API_KEY:}
  model:              ${CLOUD_LLM_VL_MODEL:qwen2.5vl}
  render-dpi:         ${CLOUD_LLM_VL_RENDER_DPI:200}
  max-pages:          ${CLOUD_LLM_VL_MAX_PAGES:10}
  max-long-edge-px:   ${CLOUD_LLM_VL_MAX_LONG_EDGE_PX:2048}
  timeout-seconds:    ${CLOUD_LLM_VL_TIMEOUT_SECONDS:120}

# --- Local vision-language LLM (MLX server / Ollama on this host) ------------
# Runs in parallel with the cloud call. Wins selection whenever it succeeds.
local-llm-vl:
  base-url:           ${LOCAL_LLM_VL_BASE_URL:http://localhost:11434/v1}
  api-key:            ${LOCAL_LLM_VL_API_KEY:}
  model:              ${LOCAL_LLM_VL_MODEL:qwen2.5vl}
  render-dpi:         ${LOCAL_LLM_VL_RENDER_DPI:200}
  max-pages:          ${LOCAL_LLM_VL_MAX_PAGES:10}
  max-long-edge-px:   ${LOCAL_LLM_VL_MAX_LONG_EDGE_PX:2048}
  timeout-seconds:    ${LOCAL_LLM_VL_TIMEOUT_SECONDS:300}

# --- Docling sidecar (text-layout extraction, supplementary source) -----------
# Enable with EXTRACTOR_DOCLING_ENABLED=true + docker compose --profile full up -d
# Produces raw_markdown (Docling's structured layout rendering) for the UI's
# Markdown tab alongside the structured field extraction.
docling:
  base-url:        ${DOCLING_BASE_URL:http://docling-svc:8081}
  timeout-seconds: ${DOCLING_TIMEOUT_SECONDS:180}

# --- MiniRU sidecar (text-layout extraction, supplementary source) ------------
# Enable with EXTRACTOR_MINERU_ENABLED=true + docker compose --profile full up -d
mineru:
  base-url:        ${MINERU_BASE_URL:http://mineru-svc:8082}
  timeout-seconds: ${MINERU_TIMEOUT_SECONDS:180}

session:
  ttl-minutes: 60
  max-size: 1000

# --- File storage (LC text + invoice PDF) ------------------------------------
# Files are stored content-addressed by SHA-256 in MinIO so re-uploading the
# same bytes never duplicates. Session-level retrieval ('/lc-raw', '/invoice')
# falls back to MinIO when the in-memory hot cache misses (e.g. after restart).
#
# PERSISTENCE REQUIREMENT: MinIO MUST use durable backing store (Docker volumes
# or a dedicated server with persistent disk). If MinIO loses data (restarted
# without persistence), previously stored files are unrecoverable — the /invoice
# and /lc-raw cold paths will return HTTP 503 STORAGE_UNAVAILABLE for all
# historical sessions whose SHA references are in the DB but whose bytes are
# gone from MinIO. To add MinIO with persistent Docker volumes, see the MinIO
# section in the root docker-compose.yml.
#
# When MINIO_ENABLED=false the controller logs a loud ERROR and sessions are
# memory-only — they survive within the same JVM but NOT across restarts.
storage:
  minio:
    enabled:    ${MINIO_ENABLED:true}
    endpoint:   ${MINIO_ENDPOINT:http://192.168.31.214:9000}
    bucket:     ${MINIO_BUCKET:lc-pdfs}
    region:     ${MINIO_REGION:us-east-1}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    path-style: ${MINIO_PATH_STYLE:true}
    # Hard ceiling for synchronous put/get on the request thread. 30s gives enough
    # headroom for a remote MinIO across LAN/WAN on first connection after restart.
    # Failures after timeout are retried up to 3× in MinioFileStore.get().
    request-timeout-seconds: ${MINIO_REQUEST_TIMEOUT_SECONDS:30}

rules:
  catalog-path: classpath:/rules/catalog.yml

# --- API documentation (springdoc-openapi → /v3/api-docs → Scalar at /docs.html) ---
# Title/description/version are set via @OpenAPIDefinition on LcCheckerApplication.
springdoc:
  api-docs:
    path: /v3/api-docs               # OpenAPI JSON spec (consumed by Scalar)
    enabled: true
  # swagger-ui is disabled — Scalar is our UI layer at /docs.html.
  swagger-ui:
    enabled: false
  default-produces-media-type: application/json
  packagesToScan: com.lc.checker.api

# --- Pipeline queue ------------------------------------------------------------
# Single-worker DB-backed queue. JobDispatcher polls for QUEUED rows every
# poll-delay-ms and runs at most `concurrency` sessions in parallel.
# Bump concurrency to 2 or 3 if the host can comfortably support more parallel
# extractor pipelines; default 1 for predictable POC behaviour.
#
# poll-delay-ms = 2000 (2s) is the sweet spot for a POC: user-perceived
# latency to start ≤ 2s, DB SELECT-FOR-UPDATE-SKIP-LOCKED churn cut 4× vs.
# the previous 500ms default, and one INFO heartbeat per minute is enough
# to confirm the dispatcher is alive without log spam. Drop to 1000ms if
# UX latency matters; raise to 5000ms+ if the queue is rarely loaded.
pipeline:
  concurrency: ${PIPELINE_CONCURRENCY:1}
  poll-delay-ms: ${PIPELINE_POLL_DELAY_MS:2000}

# --- Actuator + Prometheus + Tracing → Langfuse --------------------------------
# Tracing pipeline:
#   Spring AI ChatClient.call → Micrometer observation → OTel span →
#   OTLP exporter → Langfuse `/api/public/otel/v1/traces`.
#
# Per-LLM-call attributes captured natively (Spring AI 1.1):
#   gen_ai.system / gen_ai.request.model / gen_ai.usage.input_tokens /
#   gen_ai.usage.output_tokens / gen_ai.prompt / gen_ai.completion.
# Langfuse maps these onto Generation observations and computes cost.
#
# Sampling 1.0 in dev so every session shows up; lower in prod.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      # Langfuse OTel intake. Override LANGFUSE_HOST in .env to point elsewhere.
      endpoint: ${LANGFUSE_OTEL_ENDPOINT:${LANGFUSE_HOST:http://192.168.31.214:3300}/api/public/otel/v1/traces}
      headers:
        # LANGFUSE_AUTH_BASIC is auto-derived from PUBLIC_KEY + SECRET_KEY at
        # startup by LangfuseAuthEnvironmentPostProcessor; rotate keys without
        # touching this file.
        Authorization: Basic ${LANGFUSE_AUTH_BASIC:}
      compression: gzip
      timeout: 10s

# Spring AI observation switches — must be true to capture prompt + completion
# bodies on Generation observations. Tokens are captured regardless.
spring.ai.chat.observations:
  include-prompt: ${AI_OBS_INCLUDE_PROMPT:true}
  include-completion: ${AI_OBS_INCLUDE_COMPLETION:true}

# --- Logging -------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.lc.checker: DEBUG
    org.springframework.ai: INFO
  pattern:
    # MDC keys carried: sessionId, stage, ruleId, checkType, llmModel.
    # See logback-spring.xml / logback-json.xml for concrete encoders.
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %X{sessionId:-} %X{stage:-} %X{ruleId:-} %logger{36} - %msg%n"
