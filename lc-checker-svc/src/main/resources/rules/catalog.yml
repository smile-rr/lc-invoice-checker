# LC Invoice Checker — Rule Catalog
#
# Two-type rule engine: every rule is either PROGRAMMATIC (deterministic SpEL
# against structured fields) or AGENT (one LLM call per rule with full LC + full
# invoice context inline). The agent prompt itself decides applicability AND
# verdict, eliminating the old activation-trigger / pre-gate / check-type sprawl.
#
# Rule IDs use UCP 600 / ISBP 821 standard numbering. The `id` doubles as the
# display name returned in every API response — readable by any trade finance
# professional without consulting system docs:
#
#   UCP-18b-amount   → UCP 600 Art. 18(b), amount sub-check
#   ISBP-C3          → ISBP 821 Para. C3
#   BANK-001         → Bank-specific policy rule (not UCP/ISBP)
#
# Field reference
# ---------------
#   id                       Standard-based identifier (also display name).
#   name                     Short human name (one phrase).
#   description              One-sentence summary of the check.
#   business_phase           PARTIES | MONEY | GOODS | LOGISTICS | PROCEDURAL | HOLISTIC
#                            Display grouping only — does not affect execution order.
#   check_type               PROGRAMMATIC | AGENT
#   ucp_ref / isbp_ref       Raw UCP / ISBP anchors recorded on the CheckResult.
#   ucp_excerpt              Plain-English paraphrase of the UCP article.
#   isbp_excerpt             Counterpart for ISBP citations.
#   rule_reference_label     Pre-formatted label used as Discrepancy.rule_reference.
#   output_field             Canonical snake_case key for Discrepancy.field.
#   lc_fields                MT700 tags this rule reads (hint to agent / gate hint).
#   invoice_fields           Invoice keys this rule reads.
#   missing_invoice_action   PROGRAMMATIC only: DISCREPANT | NOT_APPLICABLE | UNABLE_TO_VERIFY
#                            applied when none of invoice_fields are present.
#   severity_on_fail         MAJOR | MINOR
#   expression               PROGRAMMATIC only: SpEL evaluated against {lc, inv}.
#   prompt_template          AGENT only: file in src/main/resources/prompts/.
#   enabled                  Default true. Disabled rules load but never execute.
#   disabled_reason          Operator-facing reason when enabled=false.

rules:

  # ============================================================================
  # PARTIES — Art. 18(a), Art. 14(e); ISBP B1–B5, C5, C6
  # "Is this invoice issued by the right seller for the right buyer?"
  # ============================================================================

  - id: UCP-18a-issuer
    name: Invoice issuer — beneficiary identity
    description: Invoice must appear to be issued by the beneficiary; seller name must be present and non-blank.
    business_phase: PARTIES
    check_type: PROGRAMMATIC
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C6"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "The beneficiary's name on the invoice must correspond with the LC (Field 59); address need not be identical but must be in the same country."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C6"
    output_field: beneficiary_on_invoice
    lc_fields: [ "59" ]
    invoice_fields: [ "seller_name" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    expression: "inv.sellerName != null && !inv.sellerName.trim().isEmpty()"

  - id: UCP-18a-applicant
    name: Invoice buyer — applicant identity
    description: Invoice must be made out in the name of the applicant; buyer name must be present and non-blank.
    business_phase: PARTIES
    check_type: PROGRAMMATIC
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C5"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "The applicant's name and address on the invoice must correspond with those in the LC (Field 50); minor formatting differences in address are acceptable if they do not create ambiguity."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C5"
    output_field: applicant_on_invoice
    lc_fields: [ "50" ]
    invoice_fields: [ "buyer_name" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    expression: "inv.buyerName != null && !inv.buyerName.trim().isEmpty()"

  - id: ISBP-C6
    name: Beneficiary name correspondence
    description: "Invoice seller name must correspond to LC :59: beneficiary, allowing ISBP A14/B1-B5 abbreviation and minor formatting variations."
    business_phase: PARTIES
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C6"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "The beneficiary's name on the invoice must correspond with the LC (Field 59); address need not be identical but must be in the same country."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C6"
    output_field: beneficiary_name
    lc_fields: [ "59" ]
    invoice_fields: [ "seller_name" ]
    severity_on_fail: MAJOR
    prompt_template: beneficiary-name-check.st

  - id: ISBP-C5
    name: Applicant name correspondence
    description: "Invoice buyer name must correspond to LC :50: applicant, allowing ISBP A14/C5 variations."
    business_phase: PARTIES
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C5"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "The applicant's name and address on the invoice must correspond with those in the LC (Field 50); minor formatting differences in address are acceptable if they do not create ambiguity."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C5"
    output_field: applicant_name
    lc_fields: [ "50" ]
    invoice_fields: [ "buyer_name" ]
    severity_on_fail: MAJOR
    prompt_template: applicant-name-check.st

  - id: UCP-14e
    name: Beneficiary and applicant address country consistency
    description: "Beneficiary and applicant addresses on invoice must be in the same countries as in the LC per Art. 14(e)."
    business_phase: PARTIES
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 14(e)"
    isbp_ref: "ISBP 821 Para. C5, C6"
    ucp_excerpt: "Addresses of the beneficiary and applicant appearing in any stipulated document need not be the same as in the credit, provided they are within the same country as in the credit."
    isbp_excerpt: "The applicant's name and address on the invoice must correspond with those in the LC (Field 50); minor formatting differences in address are acceptable if they do not create ambiguity."
    rule_reference_label: "UCP 600 Art. 14(e)"
    output_field: address_country
    lc_fields: [ "50", "59" ]
    invoice_fields: [ "seller_address", "buyer_address" ]
    severity_on_fail: MAJOR
    prompt_template: address-country-check.st

  # ============================================================================
  # MONEY — Art. 18(b), Art. 30(a/b/c); ISBP C4, C9, C10
  # "Does the money side match — currency, amount, unit price, math?"
  # ============================================================================

  - id: UCP-18b-currency
    name: Currency match
    description: Invoice currency must equal the LC currency from :32B:.
    business_phase: MONEY
    check_type: PROGRAMMATIC
    ucp_ref: "UCP 600 Art. 18(b)"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount."
    rule_reference_label: "UCP 600 Art. 18(b)"
    output_field: currency
    lc_fields: [ "32B" ]
    invoice_fields: [ "currency" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    expression: "inv.currency != null && inv.currency.equalsIgnoreCase(lc.currency)"

  - id: UCP-18b-amount
    name: Amount within LC limit
    description: Invoice total must not exceed LC amount plus the declared tolerance band from :39A:.
    business_phase: MONEY
    check_type: PROGRAMMATIC
    ucp_ref: "UCP 600 Art. 18(b)"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount. The keywords 'about' or 'approximately' allow a 10% tolerance; otherwise 5% more-or-less applies only to quantity if not unit-priced."
    rule_reference_label: "UCP 600 Art. 18(b)"
    output_field: invoice_amount
    lc_fields: [ "32B", "39A", "39B" ]
    invoice_fields: [ "total_amount", "currency" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    expression: >-
      inv.totalAmount != null
      && inv.totalAmount.compareTo(lc.amount.multiply(T(java.math.BigDecimal).ONE.add(new java.math.BigDecimal(lc.tolerancePlus).divide(new java.math.BigDecimal('100'))))) <= 0
      && inv.totalAmount.compareTo(lc.amount.multiply(T(java.math.BigDecimal).ONE.subtract(new java.math.BigDecimal(lc.toleranceMinus).divide(new java.math.BigDecimal('100'))))) >= 0

  - id: ISBP-C4
    name: Unit price matches LC stipulation
    description: "When LC :45A: stipulates a unit price, invoice must reflect the same unit price per ISBP C4."
    business_phase: MONEY
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(b)"
    isbp_ref: "ISBP 821 Para. C4"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount."
    isbp_excerpt: "If the LC stipulates a unit price, the invoice must reflect that unit price; a higher total arising from a different unit price is discrepant even if the grand total falls within tolerance."
    rule_reference_label: "UCP 600 Art. 18(b) / ISBP 821 Para. C4"
    output_field: unit_price
    lc_fields: [ "45A" ]
    invoice_fields: [ "unit_price" ]
    severity_on_fail: MAJOR
    prompt_template: unit-price-check.st

  - id: UCP-18b-math
    name: Invoice math consistency
    description: Quantity × unit price must equal total amount within a 0.01 rounding tolerance.
    business_phase: MONEY
    check_type: PROGRAMMATIC
    ucp_ref: "UCP 600 Art. 18(b)"
    ucp_excerpt: "Internal invoice arithmetic must reconcile so the documentary face value is unambiguous."
    rule_reference_label: "UCP 600 Art. 18(b)"
    output_field: amount_math
    lc_fields: [ "32B" ]
    invoice_fields: [ "quantity", "unit_price", "total_amount" ]
    missing_invoice_action: UNABLE_TO_VERIFY
    severity_on_fail: MAJOR
    expression: >-
      inv.quantity != null && inv.unitPrice != null && inv.totalAmount != null
      && inv.quantity.multiply(inv.unitPrice).subtract(inv.totalAmount).abs().compareTo(new java.math.BigDecimal('0.01')) <= 0

  - id: UCP-30a
    name: Quantity tolerance — 'about/approximately' (±10%)
    description: "When LC uses 'about' or 'approximately', a ±10% tolerance applies to quantity, amount, and unit price."
    business_phase: MONEY
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 30(a)"
    ucp_excerpt: "The words 'about' or 'approximately' used in connection with the amount of the credit or the quantity or the unit price stated in the credit are to be construed as allowing a tolerance not to exceed 10% more or 10% less."
    rule_reference_label: "UCP 600 Art. 30(a)"
    output_field: quantity_tolerance_about
    lc_fields: [ "45A", "32B" ]
    invoice_fields: [ "quantity", "total_amount" ]
    severity_on_fail: MINOR
    prompt_template: quantity-tolerance-check.st

  - id: UCP-30b
    name: Quantity tolerance — ±5% bulk goods
    description: "A tolerance of ±5% in quantity is allowed when goods are not stated in specific packing units and the drawing does not exceed the LC amount."
    business_phase: MONEY
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 30(b)"
    ucp_excerpt: "A tolerance not exceeding 5% more or 5% less in the quantity of the goods is allowed, provided the credit does not stipulate the quantity in terms of a stipulated number of packing units or individual items and the total amount of the drawings does not exceed the amount of the credit."
    rule_reference_label: "UCP 600 Art. 30(b)"
    output_field: quantity_tolerance_bulk
    lc_fields: [ "45A" ]
    invoice_fields: [ "quantity" ]
    severity_on_fail: MINOR
    prompt_template: quantity-tolerance-check.st

  # ============================================================================
  # GOODS — Art. 18(c); ISBP C3, C7
  # "Is the description / quantity / origin consistent with the LC?"
  # ============================================================================

  - id: ISBP-C3
    name: Goods description correspondence
    description: "Invoice goods description must correspond to LC :45A:; may be more specific, must not contradict or be more general."
    business_phase: GOODS
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(c)"
    isbp_ref: "ISBP 821 Para. C3"
    ucp_excerpt: "Description of goods, services, or performance on the invoice must correspond with that appearing in the LC."
    isbp_excerpt: "The description of goods on the invoice must correspond with the LC description; it may be more specific but must NOT be more general; the description need not be identical word-for-word but must clearly correspond."
    rule_reference_label: "UCP 600 Art. 18(c) / ISBP 821 Para. C3"
    output_field: goods_description
    lc_fields: [ "45A" ]
    invoice_fields: [ "goods_description", "quantity", "unit" ]
    severity_on_fail: MAJOR
    prompt_template: goods-description-check.st

  - id: ISBP-C7
    name: Country of origin (when LC requires)
    description: "If LC :46A: requires country of origin on invoice, invoice must state it."
    business_phase: GOODS
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(c)"
    isbp_ref: "ISBP 821 Para. C7"
    ucp_excerpt: "Description of goods, services, or performance on the invoice must correspond with that appearing in the LC."
    isbp_excerpt: "If the LC requires country of origin to be stated on the invoice, absence is a discrepancy."
    rule_reference_label: "UCP 600 Art. 18(c) / ISBP 821 Para. C7"
    output_field: country_of_origin
    lc_fields: [ "46A" ]
    invoice_fields: [ "country_of_origin" ]
    severity_on_fail: MAJOR
    prompt_template: country-of-origin-check.st

  # ============================================================================
  # LOGISTICS — Art. 14(j); ISBP C8, D1–D10
  # "Trade term and ports — same as LC?"
  # ============================================================================

  - id: ISBP-C8
    name: Trade terms (Incoterms) on invoice
    description: "Invoice must reflect the same trade term and destination as stated in LC :45A:."
    business_phase: LOGISTICS
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(b)"
    isbp_ref: "ISBP 821 Para. C8"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount."
    isbp_excerpt: "If the LC states a trade term (CIF, FOB, CFR, etc.), the invoice must reflect the same term and destination."
    rule_reference_label: "UCP 600 Art. 18(b) / ISBP 821 Para. C8"
    output_field: trade_terms
    lc_fields: [ "45A", "44E", "44F" ]
    invoice_fields: [ "trade_terms" ]
    severity_on_fail: MAJOR
    prompt_template: trade-terms-check.st

  # ============================================================================
  # PROCEDURAL — Art. 14(c), 14(h), 14(i), 18(a), 18(d); ISBP A19, C1, C2
  # "Dates, signature, LC#, presentation period — formally compliant?"
  # ============================================================================

  - id: ISBP-C1
    name: LC number reference on invoice
    description: "Invoice must quote the LC number when :46A: requires it."
    business_phase: PROCEDURAL
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C1"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "If the LC requires the invoice to bear the LC number, failure to state it is a discrepancy; if not required, the invoice may optionally state the LC number."
    rule_reference_label: "ISBP 821 Para. C1"
    output_field: lc_number_reference
    lc_fields: [ "46A" ]
    invoice_fields: [ "lc_reference" ]
    severity_on_fail: MAJOR
    prompt_template: lc-number-reference-check.st

  - id: ISBP-C2
    name: Invoice signature (when LC requires)
    description: "Invoice must be signed when LC :46A: explicitly requires a signed commercial invoice."
    business_phase: PROCEDURAL
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C2"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "Invoice need not be signed unless the LC explicitly requires a signature; if required, any form of authentication (stamp, electronic signature) is acceptable."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C2"
    output_field: invoice_signature
    lc_fields: [ "46A" ]
    invoice_fields: [ "signed" ]
    severity_on_fail: MAJOR
    prompt_template: signature-check.st

  - id: UCP-14i
    name: Invoice date within expiry
    description: Invoice date must not be later than the LC expiry date from :31D:.
    business_phase: PROCEDURAL
    check_type: PROGRAMMATIC
    ucp_ref: "UCP 600 Art. 14(i)"
    isbp_ref: "ISBP 821 Para. A19"
    ucp_excerpt: "Invoice must not be dated later than the date of presentation; document date must precede or equal presentation date."
    rule_reference_label: "UCP 600 Art. 14(i)"
    output_field: invoice_date
    lc_fields: [ "31D" ]
    invoice_fields: [ "invoice_date" ]
    missing_invoice_action: UNABLE_TO_VERIFY
    severity_on_fail: MAJOR
    expression: "inv.invoiceDate != null && !inv.invoiceDate.isAfter(lc.expiryDate)"

  - id: UCP-14c
    name: Presentation within 21-day window
    description: Presentation date (invoice date + presentation days from :48:) must not exceed the LC expiry date.
    business_phase: PROCEDURAL
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 14(c)"
    ucp_excerpt: "Documents must be presented within 21 calendar days after the date of shipment but not later than the expiry date of the credit."
    rule_reference_label: "UCP 600 Art. 14(c)"
    output_field: presentation_period
    lc_fields: [ "31D", "48" ]
    invoice_fields: [ "invoice_date" ]
    severity_on_fail: MAJOR
    enabled: false
    disabled_reason: "Requires B/L shipment date; single-invoice mode uses invoice date as proxy only."

  # ============================================================================
  # HOLISTIC — Art. 14(d); cross-document consistency (V2)
  # ============================================================================

  - id: UCP-14d
    name: Cross-document non-contradiction
    description: "Invoice data must not contradict data in other stipulated documents (B/L, packing list, certificate of origin)."
    business_phase: HOLISTIC
    check_type: AGENT
    ucp_ref: "UCP 600 Art. 14(d)"
    isbp_ref: "ISBP 821 Para. B1"
    ucp_excerpt: "Data in a document, when read in context with the credit, the document itself, and international standard banking practice, need not be identical to, but must not conflict with, data in that document, any other stipulated document, or the credit."
    isbp_excerpt: "When documents contain data that appear to conflict with each other, the examiner must determine whether such conflict constitutes a discrepancy."
    rule_reference_label: "UCP 600 Art. 14(d) / ISBP 821 Para. B1"
    output_field: cross_document_consistency
    lc_fields: [ "45A", "44E", "44F" ]
    invoice_fields: []
    severity_on_fail: MAJOR
    enabled: false
    disabled_reason: "Multi-document scope; single-invoice mode cannot verify cross-document contradictions."

  # ============================================================================
  # BANK CUSTOM — institution-specific policies beyond UCP 600 / ISBP 821
  # ============================================================================

  - id: BANK-001
    name: Invoice language requirement
    description: Invoice must be issued in English (bank policy; not mandated by UCP/ISBP).
    business_phase: PROCEDURAL
    check_type: AGENT
    rule_reference_label: "Bank Policy BANK-001"
    output_field: invoice_language
    lc_fields: []
    invoice_fields: [ "goods_description" ]
    severity_on_fail: MINOR
    prompt_template: bank-language-check.st
    enabled: false
    disabled_reason: "Bank deployment template; enable and configure per institution policy."
