# =============================================================================
# LC Invoice Checker — Rule Catalog
# Source: docs/refer-doc/ucp600_isbp821_invoice_rules.md → Quick Cross-Reference Matrix
# All 17 fields from the matrix are covered or explicitly noted as not included.
# =============================================================================

rules:

  # ============================================================================
  # INVOICE FIELD INDEX
  # Sequence mirrors: ucp600_isbp821_invoice_rules.md → Quick Cross-Reference Matrix
  # ============================================================================
  # ID    | Name              | Rule                    | Type          | UCP / ISBP Ref              | Field Name                               | Reason Not Included
  # ------+------------------+-------------------------+---------------+-----------------------------+-----------------------------------------+--------------------
  # F01   | Issuer           | ISBP-C6                | AGENT         | UCP 18(a)  ISBP C6          | Issuer (Beneficiary as Seller)          |
  # F02   | Buyer            | ISBP-C5                | AGENT         | UCP 18(a)  ISBP C5          | Buyer Name (Applicant)                   |
  # F03   | Signature        | ISBP-C2                | AGENT         | UCP 18(a)(d)  ISBP C2       | Invoice Signature                       |
  # F04   | LC Ref           | ISBP-C1                | AGENT         | UCP 18(a)  ISBP C1          | LC Number Reference                      |
  # F05   | Currency         | UCP-18b-currency       | PROGRAMMATIC  | UCP 18(b)  ISBP C8          | Currency                                |
  # F06   | Amount           | UCP-18b-amount         | AGENT+TOOL    | UCP 18(b)                   | Invoice Amount <= LC Amount             |
  #       |                  | UCP-18b-math           | AGENT+TOOL    | UCP 30(a)(b)(c)  ISBP C9,C10|                                        |
  #       |                  | UCP-30c                | PROGRAMMATIC  |                             |                                        |
  #       |                  | ISBP-C10               | AGENT         |                             |                                        |
  # F07   | Unit Price       | ISBP-C4                | AGENT         | UCP 18(b)  ISBP C4          | Unit Price                              |
  # F08   | Goods            | ISBP-C3                | AGENT         | UCP 18(c)  ISBP C3          | Goods Description                       |
  # F09   | Incoterms        | ISBP-C8                | AGENT         | UCP 18(b)(c)  ISBP C8       | Trade Terms (Incoterms)                |
  # F10   | Origin           | ISBP-C7                | AGENT         | UCP 18(c)  ISBP C7          | Country of Origin                       |
  # F11   | Inv. Date        | UCP-14h                | PROGRAMMATIC  | UCP 14(h)                   | Invoice Date <= Presentation Date       |
  #       |                  | UCP-14i                | PROGRAMMATIC  | UCP 14(i)  ISBP A19         |                                        |
  # F12   | Present.         |                        |               | UCP 14(c)  ISBP A1          | Presentation within 21 days             | needs B/L shipment date
  # F13   | Cross-ref        |                        |               | UCP 14(d)  ISBP B1,D1,K1    | Non-contradiction with other docs       | needs cross-document input
  # F14   | Address          | UCP-14e                | AGENT         | UCP 14(e)  ISBP C5,C6       | Address (country consistency)           |
  # F15   | Format           |                        |               | UCP 14(a)  ISBP A14,A15     | Abbreviations / Minor Typos            | applied by all rules
  # F16   | Qty Tol.         | UCP-30a                | AGENT         | UCP 30(a)                   | Quantity Tolerance (+-5% / +-10%)       |
  #       |                  | UCP-30b                | AGENT         | UCP 30(b)  ISBP C3,C4       |                                        |
  # F17   | Insurance        |                        |               | UCP 28(f)  ISBP E1          | Insurance (CIF invoices)                | needs insurance document

  # ============================================================================
  # 2. PROGRAMMATIC (Tier 1)
  # ============================================================================

  - id: UCP-18b-currency
    name: Currency match
    description: Invoice currency must equal the LC currency from :32B:.
    business_phase: MONEY
    check_type: PROGRAMMATIC
    invoice_field: F05
    ucp_ref: "UCP 600 Art. 18(b)"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount."
    rule_reference_label: "UCP 600 Art. 18(b)"
    output_field: currency
    field_keys: [ credit_currency ]
    missing_invoice_action: FAIL
    severity_on_fail: MAJOR
    expression: "inv.currency != null && inv.currency.equalsIgnoreCase(lc.currency)"

  - id: UCP-14h
    name: Document dating no later than presentation
    description: "Invoice date must not be later than today (the presentation date)."
    business_phase: PROCEDURAL
    check_type: PROGRAMMATIC
    invoice_field: F11
    ucp_ref: "UCP 600 Art. 14(h)"
    ucp_excerpt: "A document may be dated prior to the issuance date of the credit but not later than its date of presentation."
    rule_reference_label: "UCP 600 Art. 14(h)"
    output_field: invoice_date
    field_keys: [ invoice_date ]
    missing_invoice_action: DOUBTS
    severity_on_fail: MAJOR
    # Uses the canonical envelope accessor so this rule is independent of the
    # legacy typed properties on InvoiceDocument.
    expression: >-
      #invoiceFields['invoice_date'] != null
      && !#invoiceFields['invoice_date'].isAfter(T(java.time.LocalDate).now())

  - id: UCP-14i
    name: Invoice date within expiry
    description: Invoice date must not be later than the LC expiry date from :31D:.
    business_phase: PROCEDURAL
    check_type: PROGRAMMATIC
    invoice_field: F11
    ucp_ref: "UCP 600 Art. 14(i)"
    isbp_ref: "ISBP 821 Para. A19"
    ucp_excerpt: "Invoice must not be dated later than the date of presentation; document date must precede or equal presentation date."
    rule_reference_label: "UCP 600 Art. 14(i)"
    output_field: invoice_date
    field_keys: [ invoice_date, expiry_date ]
    missing_invoice_action: DOUBTS
    severity_on_fail: MAJOR
    # Both dates must be present; LocalDate.isAfter(null) NPEs, which would
    # surface as a tech-stack leak in the verdict description.
    expression: >-
      inv.invoiceDate != null
      && lc.expiryDate != null
      && !inv.invoiceDate.isAfter(lc.expiryDate)

  - id: UCP-30c
    name: Underdrawing permitted
    description: "Drawings under a LC may be for less than the LC amount even if partial shipments are not permitted; affirms invoice presence with a positive amount."
    business_phase: MONEY
    check_type: PROGRAMMATIC
    invoice_field: F06
    ucp_ref: "UCP 600 Art. 30(c)"
    ucp_excerpt: "A drawing under a credit may be for less than the amount of the credit, even if partial drawings or shipments are not permitted."
    rule_reference_label: "UCP 600 Art. 30(c)"
    output_field: invoice_amount
    field_keys: [ credit_amount ]
    missing_invoice_action: DOUBTS
    severity_on_fail: MINOR
    # Always passes once a positive invoice amount is present. The rule's
    # existence affirms in the trace that underdrawing is documentary OK; a
    # behaviour fix to UCP-18b-amount's lower bound is tracked for the next
    # iteration.
    expression: >-
      #invoiceFields['credit_amount'] != null
      && #invoiceFields['credit_amount'].compareTo(T(java.math.BigDecimal).ZERO) > 0

  # ============================================================================
  # 3. AGENT (Tier 2) — Tier 2: pure semantic LLM call, no tools
  # ============================================================================

  - id: ISBP-C1
    name: LC number reference on invoice
    description: "Invoice must quote the LC number when :46A: requires it."
    business_phase: PROCEDURAL
    check_type: AGENT
    invoice_field: F04
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C1"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "If the LC requires the invoice to bear the LC number, failure to state it is a discrepancy; if not required, the invoice may optionally state the LC number."
    rule_reference_label: "ISBP 821 Para. C1"
    output_field: lc_number_reference
    field_keys: [ lc_number, documents_required ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c1-lc-number-reference.st

  - id: ISBP-C2
    name: Invoice signature (when LC requires)
    description: "Invoice must be signed when LC :46A: explicitly requires a signed commercial invoice."
    business_phase: PROCEDURAL
    check_type: AGENT
    invoice_field: F03
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C2"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "Invoice need not be signed unless the LC explicitly requires a signature; if required, any form of authentication (stamp, electronic signature) is acceptable."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C2"
    output_field: invoice_signature
    field_keys: [ signed, documents_required ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c2-signature.st

  - id: ISBP-C3
    name: Goods description correspondence
    description: "Invoice goods description must correspond to LC :45A:; may be more specific, must not contradict or be more general."
    business_phase: GOODS
    check_type: AGENT
    invoice_field: F08
    ucp_ref: "UCP 600 Art. 18(c)"
    isbp_ref: "ISBP 821 Para. C3"
    ucp_excerpt: "Description of goods, services, or performance on the invoice must correspond with that appearing in the LC."
    isbp_excerpt: "The description of goods on the invoice must correspond with the LC description; it may be more specific but must NOT be more general; the description need not be identical word-for-word but must clearly correspond."
    rule_reference_label: "UCP 600 Art. 18(c) / ISBP 821 Para. C3"
    output_field: goods_description
    field_keys: [ goods_description, quantity, unit ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c3-goods-description.st

  - id: ISBP-C4
    name: Unit price matches LC stipulation
    description: "When LC :45A: stipulates a unit price, invoice must reflect the same unit price per ISBP C4."
    business_phase: MONEY
    check_type: AGENT
    invoice_field: F07
    ucp_ref: "UCP 600 Art. 18(b)"
    isbp_ref: "ISBP 821 Para. C4"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount."
    isbp_excerpt: "If the LC stipulates a unit price, the invoice must reflect that unit price; a higher total arising from a different unit price is discrepant even if the grand total falls within tolerance."
    rule_reference_label: "UCP 600 Art. 18(b) / ISBP 821 Para. C4"
    output_field: unit_price
    field_keys: [ unit_price, goods_description ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c4-unit-price.st

  - id: ISBP-C5
    name: Applicant name correspondence
    description: "Invoice buyer name must correspond to LC :50: applicant, allowing ISBP A14/C5 variations."
    business_phase: PARTIES
    check_type: AGENT
    invoice_field: F02
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C5"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "The applicant's name and address on the invoice must correspond with those in the LC (Field 50); minor formatting differences in address are acceptable if they do not create ambiguity."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C5"
    output_field: applicant_name
    field_keys: [ applicant_name, applicant_address ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c5-applicant-name.st

  - id: ISBP-C6
    name: Beneficiary name correspondence
    description: "Invoice seller name must correspond to LC :59: beneficiary, allowing ISBP A14/B1-B5 abbreviation and minor formatting variations."
    business_phase: PARTIES
    check_type: AGENT
    invoice_field: F01
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C6"
    ucp_excerpt: "Invoice must appear to be issued by the beneficiary; must be made out in the name of the applicant; need not be signed."
    isbp_excerpt: "The beneficiary's name on the invoice must correspond with the LC (Field 59); address need not be identical but must be in the same country."
    rule_reference_label: "UCP 600 Art. 18(a) / ISBP 821 Para. C6"
    output_field: beneficiary_name
    field_keys: [ beneficiary_name, beneficiary_address ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c6-beneficiary-name.st

  - id: ISBP-C7
    name: Country of origin (when LC requires)
    description: "If LC :46A: requires country of origin on invoice, invoice must state it."
    business_phase: GOODS
    check_type: AGENT
    invoice_field: F10
    ucp_ref: "UCP 600 Art. 18(c)"
    isbp_ref: "ISBP 821 Para. C7"
    ucp_excerpt: "Description of goods, services, or performance on the invoice must correspond with that appearing in the LC."
    isbp_excerpt: "If the LC requires country of origin to be stated on the invoice, absence is a discrepancy."
    rule_reference_label: "UCP 600 Art. 18(c) / ISBP 821 Para. C7"
    output_field: country_of_origin
    field_keys: [ country_of_origin, documents_required ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c7-country-of-origin.st

  - id: ISBP-C8
    name: Trade terms (Incoterms) on invoice
    description: "Invoice must reflect the same trade term and destination as stated in LC :45A:."
    business_phase: LOGISTICS
    check_type: AGENT
    invoice_field: F09
    ucp_ref: "UCP 600 Art. 18(b)"
    isbp_ref: "ISBP 821 Para. C8"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount."
    isbp_excerpt: "If the LC states a trade term (CIF, FOB, CFR, etc.), the invoice must reflect the same term and destination."
    rule_reference_label: "UCP 600 Art. 18(b) / ISBP 821 Para. C8"
    output_field: trade_terms
    field_keys: [ incoterms, port_of_loading, port_of_discharge ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c8-trade-terms.st

  - id: ISBP-C10
    name: Charges & deductions consistent with trade term
    description: "Freight, insurance, or other charges shown on the invoice must be consistent with the LC trade term and must not push the total above the LC amount."
    business_phase: MONEY
    check_type: AGENT
    invoice_field: F06
    isbp_ref: "ISBP 821 Para. C10"
    isbp_excerpt: "Freight, insurance, or other charges on invoice must be consistent with the trade term; charges should not inflate total above LC amount."
    rule_reference_label: "ISBP 821 Para. C10"
    output_field: charges_deductions
    field_keys: [ credit_amount, incoterms ]
    severity_on_fail: MAJOR
    prompt_template: isbp-c10-charges-deductions.st

  - id: UCP-14e
    name: Beneficiary and applicant address country consistency
    description: "Beneficiary and applicant addresses on invoice must be in the same countries as in the LC per Art. 14(e)."
    business_phase: PARTIES
    check_type: AGENT
    invoice_field: F14
    ucp_ref: "UCP 600 Art. 14(e)"
    isbp_ref: "ISBP 821 Para. C5, C6"
    ucp_excerpt: "Addresses of the beneficiary and applicant appearing in any stipulated document need not be the same as in the credit, provided they are within the same country as in the credit."
    isbp_excerpt: "The applicant's name and address on the invoice must correspond with those in the LC (Field 50); minor formatting differences in address are acceptable if they do not create ambiguity."
    rule_reference_label: "UCP 600 Art. 14(e)"
    output_field: address_country
    field_keys: [ applicant_address, beneficiary_address ]
    severity_on_fail: MAJOR
    prompt_template: ucp-14e-address-country.st

  - id: UCP-30a
    name: Quantity tolerance — 'about/approximately' (±10%)
    description: "When LC uses 'about' or 'approximately', a ±10% tolerance applies to quantity, amount, and unit price."
    business_phase: MONEY
    check_type: AGENT
    invoice_field: F16
    ucp_ref: "UCP 600 Art. 30(a)"
    ucp_excerpt: "The words 'about' or 'approximately' used in connection with the amount of the credit or the quantity or the unit price stated in the credit are to be construed as allowing a tolerance not to exceed 10% more or 10% less."
    rule_reference_label: "UCP 600 Art. 30(a)"
    output_field: quantity_tolerance_about
    field_keys: [ quantity, credit_amount, goods_description ]
    severity_on_fail: MINOR
    prompt_template: ucp-30a-quantity-tolerance-about.st

  - id: UCP-30b
    name: Quantity tolerance — ±5% bulk goods
    description: "Bulk goods get ±5%; stipulated unit counts must match exactly. Invoice quantity is checked against the LC :45A: quantity per UCP 30(b)."
    business_phase: MONEY
    check_type: AGENT
    invoice_field: F16
    ucp_ref: "UCP 600 Art. 30(b)"
    ucp_excerpt: "A tolerance not exceeding 5% more or 5% less in the quantity of the goods is allowed, provided the credit does not stipulate the quantity in terms of a stipulated number of packing units or individual items and the total amount of the drawings does not exceed the amount of the credit."
    rule_reference_label: "UCP 600 Art. 30(b)"
    output_field: quantity_tolerance_bulk
    field_keys: [ quantity, goods_description ]
    severity_on_fail: MINOR
    prompt_template: ucp-30b-quantity-tolerance-bulk.st

  # ============================================================================
  # 4. AGENT + TOOL (Tier 3) — Tier 3: LLM agent + Spring AI tool callbacks
  # ============================================================================
  # Agent decides applicability + which inputs to feed; the bound tool does
  # the deterministic math/compare. Output JSON populates `equation_used`.

  - id: UCP-18b-amount
    name: Amount within LC limit
    description: Invoice total must not exceed LC amount plus the declared tolerance band from :39A:.
    business_phase: MONEY
    check_type: AGENT
    invoice_field: F06
    # Tier 3 — agent reasons about which tolerance source applies
    # (39A explicit / 39B "NOT EXCEEDING" / 30(b) default), then the
    # tool computes the band and verdict deterministically.
    ucp_ref: "UCP 600 Art. 18(b)"
    ucp_excerpt: "Invoice must be made out in the same currency as the LC; invoice amount must not exceed the LC amount. The keywords 'about' or 'approximately' allow a 10% tolerance; otherwise 5% more-or-less applies only to quantity if not unit-priced."
    rule_reference_label: "UCP 600 Art. 18(b)"
    output_field: invoice_amount
    field_keys: [ credit_amount, credit_currency, tolerance_plus, tolerance_minus ]
    missing_invoice_action: FAIL
    severity_on_fail: MAJOR
    prompt_template: ucp-18b-amount.st
    tools: [ check_within_tolerance ]

  - id: UCP-18b-math
    name: Invoice math consistency
    description: Quantity × unit price must equal total amount within a 0.01 rounding tolerance.
    business_phase: MONEY
    check_type: AGENT
    invoice_field: F06
    # Tier 3 — agent decides whether header arithmetic is meaningful
    # (single-line vs multi-line vs CIF freight breakdown), then the tool
    # does the multiply/compare. Pure SpEL was wrong for any non-trivial
    # invoice structure.
    ucp_ref: "UCP 600 Art. 18(b)"
    ucp_excerpt: "Internal invoice arithmetic must reconcile so the documentary face value is unambiguous."
    rule_reference_label: "UCP 600 Art. 18(b)"
    output_field: amount_math
    field_keys: [ quantity, unit_price, credit_amount ]
    missing_invoice_action: DOUBTS
    severity_on_fail: MAJOR
    prompt_template: ucp-18b-math.st
    tools: [ verify_arithmetic ]

  # ============================================================================
  # 5. DISABLED — rules load for trace visibility but do not execute.
  # Sort: CONDITIONAL_ON_DOC → MULTI_INVOICE_DEFERRED → NOT_APPLICABLE_V1 → BANK_OPTIONAL
  #
  # | ID           | Field | UCP/ISBP Ref               | disabled_category        | Unblock                          |
  # | UCP-14c      | F12   | UCP 14(c)                  | CONDITIONAL_ON_DOC       | needs B/L shipment date          |
  # | ISBP-C9      | F06   | ISBP C9                    | MULTI_INVOICE_DEFERRED    | API: multi-invoice presentation  |
  # | ISBP-A24     | —     | ISBP A24                   | NOT_APPLICABLE_V1         | V2: original/copy distinction    |
  # | BANK-001     | —     | Bank policy                 | BANK_OPTIONAL             | per-institution policy           |
  # ============================================================================


  - id: UCP-14c
    name: Presentation within 21-day window (exact — requires B/L date)
    description: "Presentation date (B/L shipment date + :48: days) must not exceed the LC expiry date — the exact check per UCP 600 Art. 14(c)."
    business_phase: PROCEDURAL
    check_type: PROGRAMMATIC
    invoice_field: F12
    ucp_ref: "UCP 600 Art. 14(c)"
    rule_reference_label: "UCP 600 Art. 14(c) [exact — B/L required]"
    output_field: presentation_period
    field_keys: [ invoice_date, expiry_date, presentation_days ]
    severity_on_fail: MAJOR
    enabled: false
    disabled_category: CONDITIONAL_ON_DOC
    disabled_reason: "CONDITIONAL_ON_DOC: requires B/L shipment date. The invoice-date proxy (UCP-14i) is active. Exact version activates when transport documents are ingested."




  - id: ISBP-C9
    name: Multiple invoices combined ≤ LC amount
    description: "Where multiple invoices are presented under one LC, their combined total must not exceed the LC amount and each invoice must individually comply."
    business_phase: MONEY
    check_type: AGENT
    isbp_ref: "ISBP 821 Para. C9"
    isbp_excerpt: "If multiple invoices are presented, their combined total must not exceed the LC amount; each invoice must individually comply."
    rule_reference_label: "ISBP 821 Para. C9"
    output_field: combined_invoice_total
    field_keys: [ credit_amount ]
    severity_on_fail: MAJOR
    enabled: false
    disabled_category: MULTI_INVOICE_DEFERRED
    disabled_reason: "MULTI_INVOICE_DEFERRED: V1 single-invoice mode. Activates when the API supports multi-invoice presentation."

  # ── NOT_APPLICABLE_V1 ───────────────────────────────────────────────────────

  - id: ISBP-A24
    name: Originals vs copies — reprographic reproduction acceptable
    description: "Unless the LC requires originals, a document produced by reprographic, automated, or computerised systems may be treated as original."
    business_phase: PROCEDURAL
    check_type: AGENT
    isbp_ref: "ISBP 821 Para. A24"
    isbp_excerpt: "A document produced by reprographic, automated, or computerised systems, or as a carbon copy, may be treated as original if so marked or if the way it is made is the way originals are produced."
    rule_reference_label: "ISBP 821 Para. A24"
    output_field: original_marker
    field_keys: [ ]
    severity_on_fail: MINOR
    enabled: false
    disabled_category: NOT_APPLICABLE_V1
    disabled_reason: "NOT_APPLICABLE_V1: V1 input model does not surface the original/copy distinction on extracted invoices."

  # ── BANK_OPTIONAL ───────────────────────────────────────────────────────────

  - id: BANK-001
    name: Invoice language requirement
    description: Invoice must be issued in English (bank policy; not mandated by UCP/ISBP).
    business_phase: PROCEDURAL
    check_type: AGENT
    rule_reference_label: "Bank Policy BANK-001"
    output_field: invoice_language
    field_keys: [ goods_description ]
    severity_on_fail: MINOR
    prompt_template: bank-001-language.st
    enabled: false
    disabled_category: BANK_OPTIONAL
    disabled_reason: "BANK_OPTIONAL: per-deployment bank policy. Enable in the catalog and configure prompt for each institution that requires it."

  # =============================================================================
  # 6. NOT MODELED — fields in the index that have no rule row
  #    F12 Presentation → UCP-14c DISABLED (needs B/L shipment date)
  #    F13 Non-contradiction → not included (needs cross-document input: B/L, P/L, CoO)
  #    F15 Formatting → embedded in all rules via system prompt (ISBP A14/A15)
  #    F17 Insurance → not included (needs insurance document input)
  #
  # Other UCP/ISBP meta articles not modeled (no invoice-content check):
  #   UCP Art. 2, 3, 5, 14(b), 14(f) — definitions, bank-side SLA
  #   UCP Art. 18(d) → covered by ISBP-C2 (signature when LC requires)

