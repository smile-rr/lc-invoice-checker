# LC Invoice Checker — Rule Catalog
#
# Source of truth for Stage 2 (Rule Activation) and Stage 3 (Check Execution).
# See logic-flow.md for the 35-rule target catalog. V1 ships 3 active rules
# (INV-011, INV-015, INV-007) end-to-end and 5 stubs (enabled: false) to prove the
# loader accommodates the full catalog without Java changes.
#
# Field reference
# ---------------
#   id                      Stable rule identifier used in traces and reports.
#   name                    Short human name.
#   description             One-sentence human-readable summary of the check.
#   check_type              A | B | AB | SPI  — dispatches to the matching CheckStrategy.
#   trigger                 UNCONDITIONAL | LC_STIPULATED | DYNAMIC_47A
#   activation_expr         SpEL predicate evaluated against the LcDocument for LC_STIPULATED.
#   ucp_ref / isbp_ref      UCP 600 article / ISBP 821 paragraph emitted in the discrepancy.
#   lc_fields               MT700 tags this rule reads (for Q1 pre-gate and trace snapshots).
#   invoice_fields          Invoice keys this rule reads (for Q2 pre-gate).
#   missing_invoice_action  DISCREPANT | NOT_APPLICABLE | UNABLE_TO_VERIFY — Q2 policy.
#   severity_on_fail        MAJOR | MINOR — emitted severity when the rule fires.
#   expression              SpEL expression for Type A / pre-A step of AB.
#   pre_gate_expression     SpEL for the pre-gate of AB rules (fires before the LLM call).
#   prompt_template         File in src/main/resources/prompts/ for Type B / AB.
#   comment                 Non-developer explanation of intent.
#   enabled                 Default true. Disabled rules are loaded but never activated.

rules:

  # -------------------------------------------------------------------------
  # V1 ACTIVE — three rules wired end-to-end to match the sample output in
  # refer-doc/AI-Engineer-test-case-v2.txt
  # -------------------------------------------------------------------------

  - id: INV-011
    name: Amount within LC limit
    description: Invoice total must not exceed LC amount plus the declared tolerance band.
    check_type: A
    trigger: UNCONDITIONAL
    ucp_ref: "UCP 600 Art. 18(b)"
    isbp_ref: null
    lc_fields: [ "32B", "39A", "39B" ]
    invoice_fields: [ "total_amount", "currency" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    expression: >-
      inv.totalAmount != null
      && inv.totalAmount.compareTo(lc.amount.multiply(T(java.math.BigDecimal).ONE.add(new java.math.BigDecimal(lc.tolerancePlus).divide(new java.math.BigDecimal('100'))))) <= 0
      && inv.totalAmount.compareTo(lc.amount.multiply(T(java.math.BigDecimal).ONE.subtract(new java.math.BigDecimal(lc.toleranceMinus).divide(new java.math.BigDecimal('100'))))) >= 0
    comment: >-
      Passes when invoice total is within [amount*(1-minus%), amount*(1+plus%)].
      When :39A: is absent, tolerance is 0 so the expression degenerates to strict equality-or-less.

  - id: INV-015
    name: Goods description
    description: "Invoice description must correspond to LC :45A: (may be more specific, must not contradict or understate)."
    check_type: B
    trigger: UNCONDITIONAL
    ucp_ref: "UCP 600 Art. 18(c)"
    isbp_ref: "ISBP 821 Para. C3"
    lc_fields: [ "45A" ]
    invoice_fields: [ "goods_description", "quantity", "unit" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    prompt_template: goods-description-check.st
    comment: >-
      LLM compares LC 45A (raw + parsed goods detail) against the invoice goods line.
      Discrepant when quantity differs or when the invoice omits material elements the LC specifies.

  - id: INV-007
    name: LC number reference
    description: "Invoice must quote the LC number when :46A: requires it."
    check_type: A
    trigger: LC_STIPULATED
    activation_expr: >-
      lc.field46ARaw != null
      && (lc.field46ARaw.toUpperCase().contains('LC NUMBER')
          || lc.field46ARaw.toUpperCase().contains('CREDIT NUMBER')
          || lc.field46ARaw.toUpperCase().contains('LC NO')
          || lc.field46ARaw.toUpperCase().contains('CREDIT NO'))
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C1"
    lc_fields: [ "46A" ]
    invoice_fields: [ "lc_reference" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    expression: >-
      inv.lcReference != null && inv.lcReference.trim().equalsIgnoreCase(lc.lcNumber)
    comment: >-
      Activated only when :46A: raw text mentions the LC/credit number requirement.
      Raw-text match keeps Stage 1 LLM-free; if :46A: is silent, rule is NOT_APPLICABLE.

  # -------------------------------------------------------------------------
  # V1 STUBS — disabled entries that prove the loader handles a fuller catalog
  # without Java changes. Flip enabled:true once the relevant expressions are
  # authored; no other change required.
  # -------------------------------------------------------------------------

  - id: INV-010
    name: Currency match
    description: Invoice currency must equal LC currency.
    check_type: A
    trigger: UNCONDITIONAL
    ucp_ref: "UCP 600 Art. 18(b)"
    isbp_ref: "ISBP 821 Para. C8"
    lc_fields: [ "32B" ]
    invoice_fields: [ "currency" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    expression: "inv.currency != null && inv.currency.equalsIgnoreCase(lc.currency)"
    enabled: false
    comment: Disabled until the V1.5 checker cut-over; expression is already correct.

  - id: INV-001
    name: Beneficiary name
    description: "Invoice seller name should correspond to LC :59: beneficiary."
    check_type: B
    trigger: UNCONDITIONAL
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C6"
    lc_fields: [ "59" ]
    invoice_fields: [ "seller_name" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    prompt_template: beneficiary-name-check.st
    enabled: false
    comment: Needs new prompt template in V1.5.

  - id: INV-002
    name: Applicant name
    description: "Invoice buyer name should correspond to LC :50: applicant."
    check_type: B
    trigger: UNCONDITIONAL
    ucp_ref: "UCP 600 Art. 18(a)"
    isbp_ref: "ISBP 821 Para. C5"
    lc_fields: [ "50" ]
    invoice_fields: [ "buyer_name" ]
    missing_invoice_action: DISCREPANT
    severity_on_fail: MAJOR
    prompt_template: applicant-name-check.st
    enabled: false
    comment: Needs new prompt template in V1.5.

  - id: INV-026
    name: Invoice date
    description: Invoice date must not exceed LC presentation/expiry date.
    check_type: A
    trigger: UNCONDITIONAL
    ucp_ref: "UCP 600 Art. 14(i)"
    isbp_ref: null
    lc_fields: [ "31D" ]
    invoice_fields: [ "invoice_date" ]
    missing_invoice_action: UNABLE_TO_VERIFY
    severity_on_fail: MAJOR
    expression: "inv.invoiceDate != null && !inv.invoiceDate.isAfter(lc.expiryDate)"
    enabled: false
    comment: Flip once end-to-end date handling is wired in V1.5.

  - id: INV-028
    name: Presentation within expiry
    description: Presentation (invoice_date + presentation_days) must be within expiry.
    check_type: A
    trigger: UNCONDITIONAL
    ucp_ref: "UCP 600 Art. 14(c)"
    isbp_ref: null
    lc_fields: [ "31D", "48" ]
    invoice_fields: [ "invoice_date" ]
    missing_invoice_action: UNABLE_TO_VERIFY
    severity_on_fail: MAJOR
    expression: >-
      inv.invoiceDate != null
      && !inv.invoiceDate.plusDays(lc.presentationDays).isAfter(lc.expiryDate)
    enabled: false
    comment: Needs B/L date for the full 21-day rule; V1 version uses invoice date as a proxy.
