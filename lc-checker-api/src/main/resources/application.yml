# lc-checker-api — runtime configuration
#
# Environment overrides (see .env.example at repo root):
#   LLM_API_KEY, LLM_BASE_URL, LLM_MODEL
#   EXTRACTOR_DOCLING_URL, EXTRACTOR_MINERU_URL
#   EXTRACTOR_CONFIDENCE_THRESHOLD, EXTRACTOR_TIMEOUT_SECONDS
#
# Profiles:
#   default — console logging (logback-spring.xml)
#   prod    — JSON logging (logback-json.xml), for Loki/ELK ingest

spring:
  application:
    name: lc-checker-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${LLM_MODEL:deepseek-chat}
          temperature: 0.0

  # Multipart limits for /api/v1/lc-check (20MB PDF cap per InputValidator).
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}

# --- Application-specific config -----------------------------------------------
extractor:
  primary: ${EXTRACTOR_PRIMARY:vision}
  vision-enabled:  ${EXTRACTOR_VISION_ENABLED:true}
  docling-enabled: ${EXTRACTOR_DOCLING_ENABLED:true}
  docling-url: ${EXTRACTOR_DOCLING_URL:http://localhost:8081}
  mineru-url: ${EXTRACTOR_MINERU_URL:http://localhost:8082}
  mineru-enabled: ${EXTRACTOR_MINERU_ENABLED:false}
  confidence-threshold: ${EXTRACTOR_CONFIDENCE_THRESHOLD:0.80}
  timeout-seconds: ${EXTRACTOR_TIMEOUT_SECONDS:30}
  retries: 1
  retry-backoff-ms: 500

# --- Vision LLM extractor (V1.5 primary) ------------------------------------
# Provider switch: only base-url, model, api-key differ per provider.
#   Ollama (local M1 Mac):    vision.provider=ollama, base-url=http://host.docker.internal:11434/v1
#   Qwen Cloud:                vision.provider=qwen,   base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
#   Gemini (via adapter):      vision.provider=gemini,  base-url=https://generativelanguage.googleapis.com/v1beta/openai/
vision:
  provider: ${VISION_PROVIDER:ollama}
  base-url: ${VISION_BASE_URL:http://host.docker.internal:11434/v1}
  model: ${VISION_MODEL:moondream:2b}
  api-key: ${VISION_API_KEY:}
  temperature: ${VISION_TEMPERATURE:0.0}
  render-scale: ${VISION_RENDER_SCALE:1.5}
  timeout-seconds: ${VISION_TIMEOUT_SECONDS:120}

llm:
  fallback:
    base-url: ${LLM_FALLBACK_BASE_URL:https://api.minimaxi.chat/v1}
    model: ${LLM_FALLBACK_MODEL:MiniMax-Text-01}

session:
  ttl-minutes: 60
  max-size: 1000

rules:
  catalog-path: classpath:/rules/catalog.yml

# --- Actuator + Prometheus -----------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# --- Logging -------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.lc.checker: DEBUG
    org.springframework.ai: INFO
  pattern:
    # MDC keys carried: sessionId, stage, ruleId, checkType, llmModel.
    # See logback-spring.xml / logback-json.xml for concrete encoders.
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %X{sessionId:-} %X{stage:-} %X{ruleId:-} %logger{36} - %msg%n"
