# lc-checker — Postgres only (dev / local workflow)
#
# Only PostgreSQL runs in Docker. The Java service (lc-checker-svc) and the
# Python parsers (docling-svc / mineru-svc) run directly on the host — see the
# per-module READMEs for how to start them locally.
#
# Data persistence:
#   The `postgres-data` named volume survives `docker compose restart`,
#   `docker compose stop/start`, and `docker compose down` + `up`. Data is
#   ONLY lost when you explicitly run `docker compose down -v` (which removes
#   the volume) OR `docker volume rm lc-checker-postgres-data`.
#
# Schema:
#   ./infra/postgres/init/01-schema.sql is bind-mounted into
#   /docker-entrypoint-initdb.d and auto-runs on first cluster init (empty volume).
#   To reapply after edits: `docker compose down -v && docker compose up -d`.
# ---------------------------------------------------------------------------

name: lc-checker

services:

  postgres:
    image: postgres:16-alpine
    container_name: lc-checker-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: lc_checker
      POSTGRES_USER: lcuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lcpass123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcuser -d lc_checker"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
    name: lc-checker-postgres-data
