# lc-checker — Ubuntu production deployment
#
# Runs lc-checker-svc (Java Spring Boot) + ui (React/nginx) together.
# PostgreSQL is NOT included here — the shared instance at 192.168.31.214:5436
# is used instead (see .env.ubuntu for DB_HOST / DB_PORT).
#
# Usage (on Ubuntu):
#   docker compose build
#   docker compose up -d
#
# To rebuild a single service without touching the other:
#   docker compose build lc-checker-svc && docker compose up -d lc-checker-svc
#
# Networking:
#   Both services join lc-checker-net. nginx resolves the backend by the
#   service name "lc-checker-svc" — no hardcoded IP needed.
# ---------------------------------------------------------------------------

name: lc-checker

services:

  lc-checker-svc:
    build:
      context: ./lc-checker-svc
    image: lc-checker-svc:v1
    container_name: lc-checker-svc
    # No host port: only reachable from ui container via lc-checker-net
    env_file: .env.ubuntu
    volumes:
      - ./test/golden:/opt/samples:ro
    restart: unless-stopped
    networks:
      - lc-checker-net

  ui:
    build:
      context: ./ui
    image: lc-checker-ui:v1
    container_name: lc-checker-ui
    ports:
      - "${UI_PORT:-8083}:80"
    depends_on:
      - lc-checker-svc
    restart: unless-stopped
    networks:
      - lc-checker-net
      - shared
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-infra"
      - "traefik.http.services.lc-ui.loadbalancer.server.port=80"
      - "traefik.http.routers.lc-ui-local.rule=Host(`lccheck.infra.local`)"
      - "traefik.http.routers.lc-ui-local.entrypoints=web"
      - "traefik.http.routers.lc-ui-local.service=lc-ui"
      - "traefik.http.routers.lc-ui-public.rule=Host(`lccheck.moments-plus.com`)"
      - "traefik.http.routers.lc-ui-public.entrypoints=web,websecure"
      - "traefik.http.routers.lc-ui-public.middlewares=passcode-auth@docker"
      - "traefik.http.routers.lc-ui-public.service=lc-ui"

networks:
  lc-checker-net:
    driver: bridge
  shared:
    name: shared-infra
    external: true
